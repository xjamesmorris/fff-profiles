filament_notes = "This is the standard filament profile, for the default structural process with 15% grid infill, top & bottom layers etc. Do not\nuse this for EMI characterization. You will need a custom profile with specific infill and processing specific to your application.\n\nCalibrated July 2026 with a an E3D Standard Flow ObXiDian 500 0.4 mm nozzle, 0.2mm layer height. \n\nNotes: \n\n- Material is brittle, disable autoretract, ensure the idler screws are not too tight, and that the nozzle is preheated\n  before filament load. The filament may keep breaking in the extruder until you get this right. Recommendation: create a\n  custom filament in the CoreOne for use with ABS EMI or ESD filaments, which are often brittle.\n\n- You will need to either change the filament type or create a new User filament in the Core One console (per above).\n\n- Print speeds are generally about 20% lower than ABS, to stay under the vendor recommended 100 mm/s. It may work\n  at higher speeds.\n"
filament_purge_multiplier = 100%
filament_ramming_parameters = "250 100 42.4194 42.4194 42.4194 42.4194 42.4194| 0.05 42.4387 0.45 42.4387 0.95 42.4387 1.45 42.4387 1.95 42.4387 2.45 42.4387 2.95 42.4387 3.45 42.4387 3.95 42.4387 4.45 42.4387 4.95 42.4387"
