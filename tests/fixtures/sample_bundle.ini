# Synthetic PrusaSlicer config bundle used as a deterministic test fixture.
# Not a real profile — values are illustrative. It deliberately exercises:
#   * a filament inheriting from another *user* filament in the bundle (chain)
#   * that chain's root inheriting from a preset NOT in the bundle (system ref)
#   * a filament with an empty `inherits` (standalone)
#   * a print preset chain (for paired-process extraction)
#   * a value containing an encoded newline ("\n")
#   * a [presets] block that must be dropped on export
[print:Base Process]
layer_height = 0.2
perimeters = 3
fill_density = 15%

[print:Fast Process]
inherits = Base Process
perimeters = 2

[printer:Test Printer 0.4]
nozzle_diameter = 0.4
printer_model = COREONE

[filament:Base PLA]
inherits = Generic PLA @SYSTEM
bed_temperature = 60
temperature = 210
compatible_printers_condition = printer_model=~/(COREONE)/ and nozzle_diameter[0]==0.4

[filament:Tuned PLA]
inherits = Base PLA
temperature = 215
filament_notes = "first line\nsecond line"

[filament:Standalone ABS]
inherits =
bed_temperature = 100
temperature = 255

[presets]
print = Fast Process
filament = Tuned PLA
printer = Test Printer 0.4
